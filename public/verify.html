<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GradPath - Mentor Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; margin: 0; display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: #fff; border-right: 1px solid #e2e8f0; padding: 30px 20px; box-sizing: border-box; }
        .brand { font-size: 1.25rem; font-weight: 700; margin-bottom: 40px; }
        .nav-btn { background: transparent; border: none; color: #64748b; padding: 14px 16px; text-align: left; font-size: 0.95rem; font-weight: 600; border-radius: 10px; width: 100%; margin-bottom: 8px; display: block; text-decoration: none; }
        .nav-btn:hover { background: #f1f5f9; color: #0f172a; }
        .nav-btn.active { background: #eff6ff; color: #2563eb; }
        .workspace { flex: 1; padding: 40px 60px; max-width: 700px; }
        .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 32px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 8px; color: #475569; }
        input { width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; background: #f8fafc; font-family: inherit; }
        input:focus { outline: none; border-color: #2563eb; background: #fff; }
        button { background: #2563eb; color: white; border: none; padding: 14px 24px; font-size: 0.95rem; font-weight: 600; border-radius: 10px; cursor: pointer; width: 100%; }
        .alert { padding: 14px; border-radius: 10px; font-size: 0.95rem; font-weight: 500; margin-top: 20px; display: none; }
        .error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; display: block; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand">🚀 GradPath Portal</div>
        <a href="index.html" class="nav-btn">🏠 Home Hub</a>
        <a href="verify.html" class="nav-btn active">🛡️ Verification Portal (F8)</a>
        <a href="prep-guide.html" class="nav-btn">📋 Prep Guide Generator (F12)</a>
    </div>
    <div class="workspace">
        <h2>Verified Graduation Token Check</h2>
        <p style="color:#64748b; margin-bottom:30px;">Cross-reference credentials against university database rows to securely unlock mentor system status.</p>
        <div class="card">
            <div class="form-group">
                <label>University Student ID</label>
                <input type="text" id="sid" placeholder="Enter student record ID (e.g., 22201594)">
            </div>
            <div class="form-group">
                <label>Graduation Year</label>
                <input type="number" id="yr" placeholder="Enter graduation year (e.g., 2025)">
            </div>
            <button onclick="runVerificationCheck()">Request System Privilege Review</button>
            <div id="resBox"></div>
        </div>
    </div>

    <script>
        async function runVerificationCheck() {
            const studentId = document.getElementById('sid').value;
            const gradYear = document.getElementById('yr').value;
            const resBox = document.getElementById('resBox');

            if (!studentId || !gradYear) {
                resBox.innerHTML = `<div class="alert error">Please input complete data fields.</div>`;
                return;
            }

            const response = await fetch('/api/verify-alumni', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ studentId, gradYear })
            });
            const data = await response.json();

            if (response.ok) {
                // REDIRECT TO DEDICATED UNLOCKED WORKSPACE PAGE ON SUCCESS
                window.location.href = `mentor-hub.html?id=${studentId}&year=${gradYear}`;
            } else {
                resBox.innerHTML = `<div class="alert error">${data.message}</div>`;
            }
        }
    </script>
</body>
</html>
